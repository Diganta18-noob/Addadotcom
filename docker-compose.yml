version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: addadotcom-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: addadotcom
      POSTGRES_USER: addadotcom
      POSTGRES_PASSWORD: addadotcom_dev_2024
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
